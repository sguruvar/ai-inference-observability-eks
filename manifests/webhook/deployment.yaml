apiVersion: v1
kind: Namespace
metadata:
  name: gpu-webhook
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-webhook
  namespace: gpu-webhook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-webhook
  namespace: gpu-webhook
  labels:
    app: gpu-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-webhook
  template:
    metadata:
      labels:
        app: gpu-webhook
    spec:
      serviceAccountName: gpu-webhook
      containers:
        - name: webhook
          image: GPU_WEBHOOK_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
      volumes:
        - name: certs
          secret:
            secretName: gpu-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-webhook
  namespace: gpu-webhook
spec:
  selector:
    app: gpu-webhook
  ports:
    - port: 443
      targetPort: 8443
      name: https
