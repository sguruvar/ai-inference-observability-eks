# Light load against aggregated deployment (team-beta)
# Short prompts with long pauses → low GPU utilization (high waste)
apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen-beta-light
  namespace: dynamo-system
  labels:
    app: loadgen
    team: beta
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app: loadgen
        team: beta
    spec:
      restartPolicy: Never
      containers:
        - name: loadgen
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Light load: team-beta (aggregated) ==="
              echo "Short prompts, 5s pauses, 10 min duration"
              echo ""

              ENDPOINT="http://vllm-agg-frontend:8000"
              DURATION=600
              START=$(date +%s)
              COUNT=0

              while true; do
                NOW=$(date +%s)
                ELAPSED=$((NOW - START))
                if [ $ELAPSED -ge $DURATION ]; then
                  echo "Done. Sent $COUNT requests in ${DURATION}s."
                  break
                fi

                curl -s "$ENDPOINT/v1/chat/completions" \
                  -H "Content-Type: application/json" \
                  -d '{"model":"Qwen/Qwen3-0.6B","messages":[{"role":"user","content":"Say hello."}],"max_tokens":10,"stream":false}' \
                  -o /dev/null -w "req=$COUNT status=%{http_code} time=%{time_total}s\n" \
                  --max-time 10

                COUNT=$((COUNT + 1))
                sleep 5
              done
