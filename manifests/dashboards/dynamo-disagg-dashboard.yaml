apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamo-disagg-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dynamo-disagg.json: |-
    {
      "annotations": {"list": []},
      "description": "Dynamo Disaggregated Serving — Prefill vs Decode Analysis",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "Prefill Worker GPU Utilization",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_PROF_GR_ENGINE_ACTIVE{pod=~\".*prefill.*\",namespace=\"dynamo-system\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}}
        },
        {
          "title": "Decode Worker GPU Utilization",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_PROF_GR_ENGINE_ACTIVE{pod=~\".*decode.*\",namespace=\"dynamo-system\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}}
        },
        {
          "title": "Tensor Core Activity (Prefill vs Decode)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE{pod!=\"\",namespace=\"dynamo-system\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}}
        },
        {
          "title": "Memory Bandwidth (DRAM Active) — Decode Should Be Higher",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_PROF_DRAM_ACTIVE{pod!=\"\",namespace=\"dynamo-system\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}}
        },
        {
          "title": "GPU Memory Used (FB Used MiB)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{pod!=\"\",namespace=\"dynamo-system\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "title": "PCIe Throughput (KV Transfer via TCP)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_PROF_PCIE_TX_BYTES{pod!=\"\",namespace=\"dynamo-system\"}",
              "legendFormat": "TX: {{pod}}"
            },
            {
              "expr": "DCGM_FI_PROF_PCIE_RX_BYTES{pod!=\"\",namespace=\"dynamo-system\"}",
              "legendFormat": "RX: {{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["gpu", "dynamo", "disaggregated"],
      "time": {"from": "now-30m", "to": "now"},
      "title": "Dynamo Disaggregated — Prefill vs Decode",
      "uid": "dynamo-disagg"
    }
