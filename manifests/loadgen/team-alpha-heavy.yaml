# Heavy load against disaggregated deployment (team-alpha)
# Long prompts → stresses prefill workers, generates large KV caches
apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen-alpha-heavy
  namespace: dynamo-system
  labels:
    app: loadgen
    team: alpha
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app: loadgen
        team: alpha
    spec:
      restartPolicy: Never
      containers:
        - name: loadgen
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Heavy load: team-alpha (disaggregated) ==="
              echo "Long prompts, continuous requests, 10 min duration"
              echo ""

              ENDPOINT="http://vllm-agg-frontend:8000"
              DURATION=600
              START=$(date +%s)
              COUNT=0

              PROMPT="Explain in great detail how GPU cost attribution works in a multi-tenant Kubernetes cluster running disaggregated LLM inference. Cover the following topics: NVIDIA MIG slicing and how it enables hardware isolation between tenants, DCGM exporter metrics and how they report per-pod GPU utilization via the kubelet PodResources API, Prometheus recording rules that compute 3-tier cost math from raw utilization to dollars per namespace per hour, and how NVIDIA Dynamo separates prefill and decode phases to enable independent scaling. Include specific metric names, PromQL expressions, and architectural decisions."

              while true; do
                NOW=$(date +%s)
                ELAPSED=$((NOW - START))
                if [ $ELAPSED -ge $DURATION ]; then
                  echo "Done. Sent $COUNT requests in ${DURATION}s."
                  break
                fi

                curl -s "$ENDPOINT/v1/completions" \
                  -H "Content-Type: application/json" \
                  -d "{\"model\":\"Qwen/Qwen3-0.6B\",\"prompt\":\"$PROMPT\",\"max_tokens\":200}" \
                  -o /dev/null -w "req=$COUNT status=%{http_code} time=%{time_total}s\n" \
                  --max-time 30

                COUNT=$((COUNT + 1))
                sleep 0.5
              done
