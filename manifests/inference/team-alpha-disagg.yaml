# Team Alpha: Disaggregated serving on MIG slices
# PrefillWorker + DecodeWorker each get one 3g.40gb MIG slice (3/7 compute + 40GB)
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-disagg
  namespace: dynamo-system
  labels:
    team: alpha
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.1.1
    VllmDecodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: decode
      replicas: 1
      resources:
        requests:
          gpu: "1"
          gpuType: "nvidia.com/mig-3g.20gb"
        limits:
          gpu: "1"
          gpuType: "nvidia.com/mig-3g.20gb"
      extraPodSpec:
        tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace/examples/backends/vllm
          command:
            - /bin/bash
            - -c
            - |
              exec python3 -m dynamo.vllm \
                --model Qwen/Qwen3-0.6B \
                --disaggregation-mode decode \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cpu","kv_connector_extra_config": {"backends": ["TCP"]}}'
    VllmPrefillWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: prefill
      replicas: 1
      resources:
        requests:
          gpu: "1"
          gpuType: "nvidia.com/mig-3g.20gb"
        limits:
          gpu: "1"
          gpuType: "nvidia.com/mig-3g.20gb"
      extraPodSpec:
        tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
        mainContainer:
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace/examples/backends/vllm
          command:
            - /bin/bash
            - -c
            - |
              exec python3 -m dynamo.vllm \
                --model Qwen/Qwen3-0.6B \
                --disaggregation-mode prefill \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cpu","kv_connector_extra_config": {"backends": ["TCP"]}}'
