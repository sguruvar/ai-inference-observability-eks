apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-cost-attribution-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu-cost-attribution.json: |-
    {
      "annotations": {"list": []},
      "description": "GPU Cost Attribution — Per DGD (Dynamo + vLLM)",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "GPU Cost per Hour by DGD",
          "type": "table",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "deployment:gpu_cost_per_hour:sum",
              "format": "table",
              "instant": true,
              "legendFormat": "{{dgd}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "currencyUSD", "decimals": 2},
            "overrides": []
          }
        },
        {
          "title": "GPU Waste % by DGD",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "deployment:gpu_waste_fraction:ratio * 100",
              "legendFormat": "{{dgd}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 30},
                  {"color": "red", "value": 60}
                ]
              }
            }
          }
        },
        {
          "title": "GPU Utilization Over Time (per pod)",
          "type": "timeseries",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "pod:gpu_utilization:avg5m",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percentunit", "min": 0, "max": 1}
          }
        },
        {
          "title": "Allocated vs Effective Cost",
          "type": "barchart",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "deployment:gpu_cost_per_hour:sum",
              "legendFormat": "Allocated: {{dgd}}"
            },
            {
              "expr": "deployment:gpu_effective_cost_per_hour:sum",
              "legendFormat": "Effective: {{dgd}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "currencyUSD"}}
        },
        {
          "title": "GPU Price per Hour (from AWS Price List API)",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "gpu_price_per_hour",
              "legendFormat": "{{instance_type}} ({{gpu_model}})"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2}}
        },
        {
          "title": "DCGM Power Draw by Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 26},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{pod!=\"\",namespace=\"dynamo-system\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "watt"}}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["gpu", "cost", "dynamo"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "title": "GPU Cost Attribution — Per DGD",
      "uid": "gpu-cost-attribution"
    }
